name: Backend CI Pipeline

on:
  push:
    branches: [ main ]

jobs:

  checkout-source-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

  build-and-publish-artifact:
    name: Build and Publish Artifact
    runs-on: ubuntu-latest
    needs: checkout-source-code

    steps:
      - uses: actions/checkout@v4

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      # ✅ Package only tracking-service
      - name: Zip tracking-service
        run: |
          cd tracking-service
          zip -r ../tracking-package.zip . -x "*.git*" "__pycache__/*"

      - name: Checkout Artifact Repo
        uses: actions/checkout@v4
        with:
          repository: SoftwareStackSolutions/digi_community_booktrack_artifact
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: artifact-repo

      # ✅ Use Tracking folder
      - name: Check previous hash
        run: |
          mkdir -p artifact-repo/Tracking
          cd artifact-repo/Tracking

          latest_file=$(ls Tracking-v*.zip 2>/dev/null | sort -V | tail -n 1)

          if [[ -f "$latest_file" ]]; then
            unzip -p "$latest_file" | sha256sum | cut -d' ' -f1 > ../../../latest_hash.txt
          else
            echo "no_previous_hash" > ../../../latest_hash.txt
          fi

      - name: Generate current hash
        run: |
          unzip -p tracking-package.zip | sha256sum | cut -d' ' -f1 > current_hash.txt

      - name: Compare hash
        id: hash
        run: |
          if cmp -s latest_hash.txt current_hash.txt; then
            echo "no_change=true" >> $GITHUB_OUTPUT
          else
            echo "no_change=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if no change
        if: steps.hash.outputs.no_change == 'true'
        run: echo "No changes detected"

      - name: Get next version
        if: steps.hash.outputs.no_change == 'false'
        id: version
        run: |
          cd artifact-repo/Tracking
          count=$(ls Tracking-v*.zip 2>/dev/null | wc -l)
          echo "version=v$((count + 1))" >> $GITHUB_OUTPUT

      - name: Move artifact
        if: steps.hash.outputs.no_change == 'false'
        run: |
          VERSION=${{ steps.version.outputs.version }}

          mv tracking-package.zip artifact-repo/Tracking/Tracking-${VERSION}.zip
          cp artifact-repo/Tracking/Tracking-${VERSION}.zip artifact-repo/Tracking/Tracking-latest.zip

      - name: Cleanup old artifacts (keep last 5)
        if: steps.hash.outputs.no_change == 'false'
        run: |
          cd artifact-repo/Tracking

          echo "Before cleanup:"
          ls -1 Tracking-v*.zip || true

          ls -1 Tracking-v*.zip 2>/dev/null | sort -V | head -n -5 | xargs -r rm -f

          echo "After cleanup:"
          ls -1 Tracking-v*.zip || true
          
      - name: Commit & Push
        if: steps.hash.outputs.no_change == 'false'
        run: |
          cd artifact-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Tracking/*.zip
          git commit -m "Add Tracking Artifact ${{ steps.version.outputs.version }}"
          git push origin main
# -----------------------------------------
# 3️⃣ BUILD & PUSH TO ECR
# -----------------------------------------

  Container-Build-and-Publish:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-publish-artifact

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout artifact repo
        uses: actions/checkout@v4
        with:
          repository: SoftwareStackSolutions/digi_community_booktrack_artifact
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: artifact-repo

      - name: Copy latest artifact
        run: |
          cp artifact-repo/Tracking/Tracking-latest.zip ./artifact.zip

      - name: Extract artifact
        run: |
          mkdir app
          unzip artifact.zip -d app

      # AWS LOGIN
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ACCOUNT ID
      - name: Get AWS Account ID
        id: aws_account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      # ECR LOGIN
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login \
            --username AWS \
            --password-stdin \
            ${{ steps.aws_account.outputs.account_id }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      # BUILD IMAGE
      - name: Build Docker Image
        run: |
          docker build -t tracking-app ./app


      # TAG IMAGE
      - name: Tag Image
        run: |
          VERSION=${{ needs.build-and-publish-artifact.outputs.version }}

          ACCOUNT_ID=${{ steps.aws_account.outputs.account_id }}

          REGION=${{ secrets.AWS_REGION }}

          ECR_URI=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/auth-app

          docker tag tracking-app:latest $ECR_URI:$VERSION
          docker tag tracking-app:latest $ECR_URI:latest

      # PUSH IMAGE
      - name: Push to ECR
        run: |
          VERSION=${{ needs.build-and-publish-artifact.outputs.version }}

          ACCOUNT_ID=${{ steps.aws_account.outputs.account_id }}

          REGION=${{ secrets.AWS_REGION }}

          ECR_URI=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/tracking-app

          docker push $ECR_URI:$VERSION
          docker push $ECR_URI:latest

  # -----------------------------------------
# 4️⃣ DEPLOY TO EKS
# -----------------------------------------
  deploy-to-eks:
    runs-on: ubuntu-latest

    needs:
      - Container-Build-and-Publish
      - build-and-publish-artifact

    permissions:
      id-token: write
      contents: read

    steps:

      - uses: actions/checkout@v4

      # AWS LOGIN
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ACCOUNT ID
      - name: Get AWS Account ID
        id: aws_account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      # KUBECONFIG
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      # DEPLOY
      - name: Deploy to EKS
        run: |

          VERSION=${{ needs.build-and-publish-artifact.outputs.version }}

          ACCOUNT_ID=${{ steps.aws_account.outputs.account_id }}

          REGION=${{ secrets.AWS_REGION }}

          IMAGE="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/tracking-app:$VERSION"

          echo "Deploying image: $IMAGE"

          kubectl apply -f secrets.yaml

          kubectl apply -f tracking-deployment.yaml

          kubectl apply -f tracking-service.yaml

          kubectl set image deployment/tracking-service \
            auth-service=$IMAGE \
            -n tracking-app

          kubectl rollout status deployment/tracking-service -n tracking-app

      - name: Verify Pods
        run: |
          kubectl get pods -n tracking-app

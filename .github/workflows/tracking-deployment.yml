name: Backend CI Pipeline

on:
  push:
    branches: [ main ]

jobs:

  checkout-source-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

  build-and-publish-artifact:
    name: Build and Publish Artifact
    runs-on: ubuntu-latest
    needs: checkout-source-code

    steps:
      - uses: actions/checkout@v4

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      # ✅ Package only tracking-service
      - name: Zip tracking-service
        run: |
          cd tracking-service
          zip -r ../tracking-package.zip . -x "*.git*" "__pycache__/*"

      - name: Checkout Artifact Repo
        uses: actions/checkout@v4
        with:
          repository: SoftwareStackSolutions/digi_community_booktrack_artifact
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: artifact-repo

      # ✅ Use Tracking folder
      - name: Check previous hash
        run: |
          mkdir -p artifact-repo/Tracking
          cd artifact-repo/Tracking

          latest_file=$(ls Tracking-v*.zip 2>/dev/null | sort -V | tail -n 1)

          if [[ -f "$latest_file" ]]; then
            unzip -p "$latest_file" | sha256sum | cut -d' ' -f1 > ../../../latest_hash.txt
          else
            echo "no_previous_hash" > ../../../latest_hash.txt
          fi

      - name: Generate current hash
        run: |
          unzip -p tracking-package.zip | sha256sum | cut -d' ' -f1 > current_hash.txt

      - name: Compare hash
        id: hash
        run: |
          if cmp -s latest_hash.txt current_hash.txt; then
            echo "no_change=true" >> $GITHUB_OUTPUT
          else
            echo "no_change=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if no change
        if: steps.hash.outputs.no_change == 'true'
        run: echo "No changes detected"

      - name: Get next version
        if: steps.hash.outputs.no_change == 'false'
        id: version
        run: |
          cd artifact-repo/Tracking
          count=$(ls Tracking-v*.zip 2>/dev/null | wc -l)
          echo "version=v$((count + 1))" >> $GITHUB_OUTPUT

      - name: Move artifact
        if: steps.hash.outputs.no_change == 'false'
        run: |
          VERSION=${{ steps.version.outputs.version }}

          mv tracking-package.zip artifact-repo/Tracking/Tracking-${VERSION}.zip
          cp artifact-repo/Tracking/Tracking-${VERSION}.zip artifact-repo/Tracking/Tracking-latest.zip

      - name: Commit & Push
        if: steps.hash.outputs.no_change == 'false'
        run: |
          cd artifact-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Tracking/*.zip
          git commit -m "Add Tracking Artifact ${{ steps.version.outputs.version }}"
          git push origin main

  Container-Build-and-Publish:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-publish-artifact

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout artifact repo
        uses: actions/checkout@v4
        with:
          repository: SoftwareStackSolutions/digi_community_booktrack_artifact
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: artifact-repo

      - name: Copy latest artifact
        run: |
          cp artifact-repo/Tracking/Tracking-latest.zip ./artifact.zip

      - name: Extract artifact
        run: |
          mkdir app
          unzip artifact.zip -d app

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t python-application:latest ./app

      - name: Tag image
        run: |
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          docker tag python-application:latest ghcr.io/$OWNER/python-application:latest

      - name: Push image
        run: |
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          docker push ghcr.io/$OWNER/python-application:latest
